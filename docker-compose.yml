
services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: fastapi_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-fastapi_db}
    ports:
      - "${HOST_POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fastapi_network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: fastapi_redis
    ports:
      - "${HOST_REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - fastapi_network

  # FastAPI Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fastapi_app
    ports:
      - "${HOST_APP_PORT:-8000}:8000"
    environment:
      - DATABASE__DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-fastapi_db}
      - REDIS__REDIS_URL=redis://redis:6379/0
      - CELERY__CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY__CELERY_RESULT_BACKEND=redis://redis:6379/2
      - APP__ENVIRONMENT=development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - ./logs:/app/logs
    networks:
      - fastapi_network
    restart: unless-stopped

  # Celery Worker (Optional) - Commented out until app/tasks.py is created
  # celery_worker:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   container_name: fastapi_celery_worker
  #   command: celery -A app.tasks worker --loglevel=info
  #   environment:
  #     - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-fastapi_db}
  #     - REDIS_URL=redis://redis:6379/0
  #     - CELERY_BROKER_URL=redis://redis:6379/1
  #     - CELERY_RESULT_BACKEND=redis://redis:6379/2
  #   depends_on:
  #     - postgres
  #     - redis
  #   volumes:
  #     - ./app:/app/app
  #   networks:
  #     - fastapi_network
  #   restart: unless-stopped

  # Celery Beat (Optional - for scheduled tasks) - Commented out until app/tasks.py is created
  # celery_beat:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   container_name: fastapi_celery_beat
  #   command: celery -A app.tasks beat --loglevel=info
  #   environment:
  #     - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-fastapi_db}
  #     - REDIS_URL=redis://redis:6379/0
  #     - CELERY_BROKER_URL=redis://redis:6379/1
  #     - CELERY_RESULT_BACKEND=redis://redis:6379/2
  #   depends_on:
  #     - postgres
  #     - redis
  #   volumes:
  #     - ./app:/app/app
  #   networks:
  #     - fastapi_network
  #   restart: unless-stopped

networks:
  fastapi_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
